   <!DOCTYPE html>
   <html lang="ar" dir="rtl">
   <head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>تسجيل الدخول - Our Home</title>
       
       <!-- الروابط الخارجية -->
       <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
       <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
       <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@500;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
       
       <!-- ملف الأنماط المخصصة -->
       <link rel="stylesheet" href="login.css">
   </head>
   <body>
       <!-- قسم تسجيل الدخول -->
       <section class="login-section">
           <div class="container">
               <div class="row justify-content-center">
                   <div class="col-md-6">
                       <div class="login-card">
                           <h2 class="text-center mb-4">تسجيل الدخول</h2>
                           <form id="loginForm">
                               <!-- حقل البريد الإلكتروني -->
                               <div class="mb-3">
                                   <label for="email" class="form-label">البريد الإلكتروني</label>
                                   <input type="email" class="form-control" id="email" placeholder="أدخل بريدك الإلكتروني" required>
                                   <div class="invalid-feedback">يرجى إدخال بريد إلكتروني صحيح.</div>
                               </div>
   
                               <!-- حقل كلمة المرور -->
                               <div class="mb-3">
                                   <label for="password" class="form-label">كلمة المرور</label>
                                   <input type="password" class="form-control" id="password" placeholder="أدخل كلمة المرور" required>
                                   <div class="invalid-feedback">يرجى إدخال كلمة مرور صحيحة.</div>
                               </div>
   
                               <!-- زر الدخول -->
                               <button type="submit" class="btn btn-primary w-100">دخول</button>
   
                               <!-- رابط إنشاء حساب جديد -->
                               <p class="text-center mt-3">
                                   ليس لديك حساب؟ <a href="register.html" class="text-primary">أنشئ حسابًا جديدًا</a>
                               </p>
                           </form>
                       </div>
                   </div>
               </div>
           </div>
       </section>
   
       <!-- ملف السكربتات -->
       <script src="login.js"></script>
   </body>
   </html>
