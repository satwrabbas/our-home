   <!DOCTYPE html>
   <html lang="ar" dir="rtl">
   <head>
       <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title>Our Home - إضافة عقارات ووكلاء</title>
       
       <!-- الروابط الخارجية -->
       <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
       <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
       <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@500;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
       <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
   
       <!-- ملف الأنماط المخصصة -->
       <link rel="stylesheet" href="..\real_estate.css">
   
   <body>
   
       <!-- شريط التنقل -->
       <nav class="navbar main-nav navbar-expand-lg fixed-top">
           <div class="container">
               <a class="navbar-brand nav-brand" href="#">
               </a>
               
               <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                   <span class="navbar-toggler-icon"></span>
               </button>
               
               <div class="collapse navbar-collapse" id="mainNav">
                   <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                       <li class="nav-item"><a class="nav-link" href="..\index.html">العودة للرئيسية</a></li>
                   </ul>
               </div>
           </div>
       </nav>
   
       <!-- قسم الإضافة الرئيسي -->
       <main class="container py-5" style="margin-top: 100px;">
           <div class="row g-5">
               <!-- قسم إضافة العقارات -->
               <div class="col-md-6 animate-fade">
                   <div class="bg-light p-4 rounded-3 shadow">
                       <h2 class="text-primary mb-4"><i class="fas fa-home me-2"></i>إضافة عقار جديد</h2>
                       <form id="propertyForm">
                           <div class="mb-3">
                               <label class="form-label">نوع العقار</label>
                               <select class="form-select" required>
                                   <option value="">اختر النوع</option>
                                   <option>فيلا</option>
                                   <option>شقة</option>
                                   <option>أرض</option>
                               </select>
                           </div>
                           
                           <div class="mb-3">
                               <label class="form-label">العنوان</label>
                               <input type="text" class="form-control" placeholder="موقع العقار" required>
                           </div>
                           
                           <div class="row g-3 mb-3">
                               <div class="col-md-6">
                                   <label class="form-label">السعر (ر.س)</label>
                                   <input type="number" class="form-control" required>
                               </div>
                               <div class="col-md-6">
                                   <label class="form-label">المساحة (م²)</label>
                                   <input type="number" class="form-control" required>
                               </div>
                           </div>
                           
                           <div class="row g-3 mb-4">
                               <div class="col-6">
                                   <label class="form-label">عدد الغرف</label>
                                   <input type="number" class="form-control" required>
                               </div>
                               <div class="col-6">
                                   <label class="form-label">عدد الحمامات</label>
                                   <input type="number" class="form-control" required>
                               </div>
                           </div>
                           
                           <button type="submit" class="btn btn-primary w-100">
                               <i class="fas fa-plus-circle me-2"></i>إضافة العقار
                           </button>
                       </form>
                   </div>
               </div>
   
               <!-- قسم إضافة الوكلاء -->
               <div class="col-md-6 animate-fade" style="animation-delay: 0.2s;">
                   <div class="bg-light p-4 rounded-3 shadow">
                       <h2 class="text-primary mb-4"><i class="fas fa-user-tie me-2"></i>إضافة وكيل جديد</h2>
                       <form id="agentForm">
                           <div class="mb-3">
                               <label class="form-label">اسم الوكيل</label>
                               <input type="text" class="form-control" placeholder="الاسم الكامل" required>
                           </div>
                           
                           <div class="mb-3">
                               <label class="form-label">صورة الوكيل</label>
                               <input type="file" class="form-control" accept="image/*" required>
                           </div>
                           
                           <div class="mb-3">
                               <label class="form-label">التقييم (من 5)</label>
                               <select class="form-select" required>
                                   <option value="">اختر التقييم</option>
                                   <option>5</option>
                                   <option>4.5</option>
                                   <option>4</option>
                               </select>
                           </div>
                           
                           <div class="mb-4">
                               <label class="form-label">معلومات الاتصال</label>
                               <input type="tel" class="form-control" placeholder="رقم الجوال" required>
                           </div>
                           
                           <button type="submit" class="btn btn-primary w-100">
                               <i class="fas fa-user-plus me-2"></i>إضافة الوكيل
                           </button>
                       </form>
                   </div>
               </div>
           </div>
       </main>
   
       <!-- ملف السكربتات -->
       <script src="..\add_property_agent\add_property_agent.js">
       </script>
   </body>
   </html>
